<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Central Medical - Facturación</title>
    <style>
        body { font-family: Arial; background-color: #f4f7f6; margin: 0; padding: 0; }
        header { background-color: #3b5763; color: white; padding: 20px; text-align: center; }
        nav { background-color: #567C8D; text-align: center; }
        nav ul { list-style: none; padding: 0; margin: 0; }
        nav ul li { display: inline-block; }
        nav ul li a { display: block; color: white; padding: 15px 20px; text-decoration: none; }
        nav ul li a:hover, nav ul li a.active { background-color: #43616F; }
        .contenedor { max-width: 1000px; margin: 30px auto; background: white; padding: 30px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background-color: #567C8D; color: white; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }
        form { background: #eef2f3; padding: 20px; margin-bottom: 20px; }
        form input { display: block; width: 95%; padding: 8px; margin-bottom: 10px; }
        form button { padding: 10px 20px; background: #3b5763; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1>Central Medical</h1>
</header>

<nav>
    <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="doctores.html">Doctores</a></li>
        <li><a href="pacientes.html">Pacientes</a></li>
        <li><a href="citas.html">Consultas / Citas</a></li>
        <li><a href="ventas.html">Medicamentos / Ventas</a></li>
        <li><a href="facturacion.html" class="active">Facturación</a></li>
    </ul>
</nav>

<div class="contenedor">
    <h2>Agregar Nueva Factura</h2>
    <form id="formularioFacturas">
        <input type="text" id="fol" placeholder="Folio" required>
        <input type="text" id="con" placeholder="Concepto de Cobro" required>
        <input type="text" id="mon" placeholder="Monto Total" required>
        <button type="submit">Guardar</button>
    </form>

    <h2>Registro de Facturas Emitidas</h2>
    <table>
        <thead>
            <tr>
                <th>Folio</th>
                <th>Concepto de Cobro</th>
                <th>Monto Total</th>
            </tr>
        </thead>
        <tbody id="cuerpoTablaFacturas">
            <tr><td>F-001</td><td>Consulta General Urgencias</td><td>$350.00</td></tr>
            <tr><td>F-003</td><td>Tratamiento Dental Básico</td><td>$500.00</td></tr>
        </tbody>
    </table>
</div>

<script>
    function cargarFacturas() {
        fetch('/api/facturas')
            .then(res => res.json())
            .then(facturas => {
                var tabla = document.getElementById("cuerpoTablaFacturas");
                tabla.innerHTML = "";
                facturas.forEach(f => {
                    tabla.innerHTML += "<tr>" +
                        "<td>" + f.Folio + "</td>" +
                        "<td>" + f.Concepto + "</td>" +
                        "<td>" + f.Monto + "</td>" +
                    "</tr>";
                });
            })
            .catch(err => console.log(err));
    }

    document.getElementById("formularioFacturas").addEventListener("submit", function(e) {
        e.preventDefault();

        var datos = {
            Folio: document.getElementById("fol").value,
            Concepto: document.getElementById("con").value,
            Monto: document.getElementById("mon").value
        };

        fetch('/api/facturas', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(datos)
        })
        .then(res => {
            if (res.ok) {
                document.getElementById("formularioFacturas").reset();
                cargarFacturas();
            }
        })
        .catch(err => console.log(err));
    });

    window.onload = cargarFacturas;
</script>

</body>
</html>
