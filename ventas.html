<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Central Medical - Pacientes</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; }
        header { background-color: #3b5763; color: white; padding: 20px; text-align: center; }
        .header-title { margin: 0; font-size: 28px; }
        nav { background-color: #567C8D; display: flex; justify-content: center; }
        nav ul { list-style-type: none; margin: 0; padding: 0; display: flex; }
        nav ul li a { display: block; color: white; text-align: center; padding: 14px 20px; text-decoration: none; font-size: 16px; }
        nav ul li a:hover, nav ul li a.active { background-color: #43616F; }
        .contenedor { max-width: 1000px; margin: 30px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #3b5763; margin-top: 0; }
        
        /* Estilo de Tabla Limpia */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background-color: #567C8D; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #ddd; color: #333; }
        tr:hover { background-color: #f1f5f9; }

        /* Formulario Estilizado sin estiramientos raros */
        form { background-color: #f9fbfb; padding: 20px; border: 1px solid #e2e8f0; border-radius: 6px; margin-bottom: 25px; }
        input, select, button { padding: 8px 12px; margin: 5px 0; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 14px; }
        button { background-color: #567C8D; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #43616F; }
    </style>
</head>
<body>

<header>
    <h1 class="header-title">Central Medical</h1>
</header>

<nav>
    <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="doctores.html">Doctores</a></li>
        <li><a href="pacientes.html" class="active">Pacientes</a></li>
        <li><a href="citas.html">Consultas / Citas</a></li>
        <li><a href="ventas.html">Medicamentos / Ventas</a></li>
        <li><a href="facturacion.html">Facturación</a></li>
    </ul>
</nav>

<div class="contenedor">
    <h2>CENTRAL MEDICAL</h2>
    
    <form id="formulario">
        <strong>Ingresar Nuevo Registro:</strong><br><br>
        Nombre: <input type="text" id="nom" required> &nbsp;
        Edad: <input type="number" id="ed" style="width: 70px;" required> &nbsp;
        Sangre: 
        <select id="san">
            <option value="O-">O-</option>
            <option value="A+">A+</option>
            <option value="B+">B+</option>
        </select> &nbsp;
        Síntomas: <input type="text" id="sin" required> &nbsp;
        <button type="submit">Guardar Datos</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre del Paciente</th>
                <th>Edad</th>
                <th>Tipo Sangre</th>
                <th>Síntomas</th>
            </tr>
        </thead>
        <tbody id="cuerpoTabla">
        </tbody>
    </table>
</div>

<script>
    var pacientes = [
        {id: "P002", nombre: "Sofía Castro", edad: 36, sangre: "A+", sintomas: "Fiebre y tos"},
        {id: "P004", nombre: "Patricia Vega", edad: 34, sangre: "O-", sintomas: "Picazón en la piel"},
        {id: "P006", nombre: "Claudia Rivas", edad: 48, sangre: "B+", sintomas: "Dolor de espalda"},
        {id: "P008", nombre: "Isabel Luján", edad: 35, sangre: "A+", sintomas: "Dolor de garganta"},
        {id: "P010", nombre: "Hugo Martínez", edad: 47, sangre: "O-", sintomas: "Revisión general"}
    ];

    // Variable interna para controlar que empiece en 11 y vaya consecutivamente
    var siguienteNumeroId = 11;

    function actualizarTabla() {
        var listaHTML = document.getElementById("cuerpoTabla");
        listaHTML.innerHTML = ""; 
        for (var i = 0; i < pacientes.length; i++) {
            listaHTML.innerHTML += "<tr>" +
                "<td>" + pacientes[i].id + "</td>" +
                "<td>" + pacientes[i].nombre + "</td>" +
                "<td>" + pacientes[i].edad + "</td>" +
                "<td>" + pacientes[i].sangre + "</td>" +
                "<td>" + pacientes[i].sintomas + "</td>" +
            "</tr>";
        }
    }

    document.getElementById("formulario").addEventListener("submit", function(event) {
        event.preventDefault(); 
        
        // Genera el ID como P011, P012, etc.
        var nuevoId = "P0" + siguienteNumeroId;

        pacientes.push({
            id: nuevoId,
            nombre: document.getElementById("nom").value,
            disabled: true,
            edad: document.getElementById("ed").value,
            sangre: document.getElementById("san").value,
            sintomas: document.getElementById("sin").value
        });

        // Suma 1 para el siguiente paciente que registres
        siguienteNumeroId++;

        actualizarTabla(); 
        this.reset(); 
    });

    window.onload = actualizarTabla;
</script>
</body>
</html>
